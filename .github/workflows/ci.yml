name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: source addition guard
        shell: pwsh
        run: ./scripts/check-source-addition.ps1
      - name: OKX instruments fetch guard
        shell: pwsh
        run: ./scripts/test-fetch-okx-instruments.ps1
      - name: market data history report guard
        shell: pwsh
        run: ./scripts/test-market-data-report-history.ps1
      - name: Polymarket market fetcher guard
        shell: pwsh
        run: ./scripts/test-polymarket-market-fetcher.ps1
      - name: Polymarket metadata freshness guard
        shell: pwsh
        run: ./scripts/test-polymarket-metadata-freshness.ps1
      - name: api docs changelog guard
        shell: pwsh
        run: ./scripts/test-api-docs-changelog.ps1
      - uses: taiki-e/install-action@nextest
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D clippy::correctness -D clippy::suspicious -D clippy::perf -D clippy::complexity -D clippy::style
      - name: cargo nextest
        run: cargo nextest run --workspace
      - name: cargo doc tests
        run: cargo test --workspace --doc

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
      - name: cargo audit
        run: cargo audit
      - name: gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.28.0 \
            detect --source /repo --redact --verbose

  dashboard-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: npm install
        run: npm install
      - name: install playwright chromium
        shell: powershell
        timeout-minutes: 2
        run: npx.cmd playwright install chromium
      - name: dashboard launcher script
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\test-start-dashboard.ps1
      - name: dashboard smoke
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\test-dashboard-smoke.ps1
      - name: upload dashboard screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dashboard-smoke-screenshots
          path: .cache/dashboard-smoke/*.png
          if-no-files-found: warn

  timescaledb:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_DB: liquidation
          POSTGRES_USER: liquidation
          POSTGRES_PASSWORD: liquidation
        ports:
          - 15433:5432
        options: >-
          --health-cmd "pg_isready -U liquidation -d liquidation"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      DATABASE_URL: postgres://liquidation:liquidation@127.0.0.1:15433/liquidation
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: sqlx migrations are idempotent
        run: |
          cargo run -p liq-cli -- db migrate --database-url "$DATABASE_URL"
          cargo run -p liq-cli -- db migrate --database-url "$DATABASE_URL"
      - name: schema-domain alignment
        run: cargo run -p liq-cli -- db check-schema --database-url "$DATABASE_URL"
      - name: recorder persistence roundtrip
        run: cargo test -p liq-recorder --test persistence

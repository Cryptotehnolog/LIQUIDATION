name: liquidation

services:
  liquidation-omniroute:
    image: ${OMNIROUTE_IMAGE}
    container_name: liquidation-omniroute
    restart: unless-stopped
    ports:
      - "${LIGHTRAG_HOST}:${LIQUIDATION_OMNIROUTE_PORT}:20128"
    volumes:
      - liquidation-omniroute-data:/app/data
    networks:
      - liquidation-rag

  liquidation-free-deepseek:
    image: ${FREE_DEEPSEEK_LOCAL_IMAGE}
    build:
      context: ./free-deepseek
      args:
        FREE_DEEPSEEK_REPO: ${FREE_DEEPSEEK_REPO}
        FREE_DEEPSEEK_REF: ${FREE_DEEPSEEK_REF}
    container_name: liquidation-free-deepseek
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "9655"
    ports:
      - "${LIGHTRAG_HOST}:${LIQUIDATION_FREE_DEEPSEEK_PORT}:9655"
    volumes:
      - liquidation-free-deepseek-data:/app/data
    networks:
      - liquidation-rag

  liquidation-lightrag:
    image: ${LIGHTRAG_IMAGE}
    container_name: liquidation-lightrag
    restart: unless-stopped
    ports:
      - "${LIGHTRAG_HOST}:${LIGHTRAG_API_PORT}:9621"
    environment:
      WORKING_DIR: /app/data/rag_storage
      INPUT_DIR: /app/data/inputs
      PROMPT_DIR: /app/data/prompts
      HOST: "0.0.0.0"
      PORT: "9621"
      LLM_BINDING: openai
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL}
      LLM_BINDING_HOST: ${LIQUIDATION_OMNIROUTE_BASE_URL}/v1
      EMBEDDING_PROVIDER_NAME: ${EMBEDDING_PROVIDER_NAME}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
    volumes:
      - ${LIGHTRAG_DATA_PATH}/rag_storage:/app/data/rag_storage
      - ${LIGHTRAG_DATA_PATH}/inputs:/app/data/inputs
      - ${LIGHTRAG_DATA_PATH}/prompts:/app/data/prompts
    networks:
      - liquidation-rag
    depends_on:
      - liquidation-omniroute
      - liquidation-free-deepseek

networks:
  liquidation-rag:
    name: liquidation-rag

volumes:
  liquidation-omniroute-data:
    name: liquidation-omniroute-data
  liquidation-free-deepseek-data:
    name: liquidation-free-deepseek-data
